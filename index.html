<style>

.tool:hover{background:#21262d}.tool.active{background:#1f6feb;color:#fff;border-color:#1f6feb}

<body>
<div class="toolbar">
  <span class="brand">Pixel<span>Forge</span></span>
  <div class="sep"></div>
  <button class="tb" id="btnUndo">Undo</button>
  <button class="tb" id="btnRedo">Redo</button>
  <div class="sep"></div>
  <button class="tb" id="btnGrid" title="Toggle Grid">Grid</button>
  <button class="tb" id="btnOnion" title="Onion Skin">Onion</button>
  <div class="sep"></div>
  <button class="tb" id="btnPlay">Play</button>
  <label style="font-size:11px;color:#8b949e;margin-left:4px">FPS:</label>
  <select id="selFps" class="tb" style="padding:2px 6px">
    <option value="4">4</option><option value="6">6</option><option value="8" selected>8</option><option value="12">12</option>
  </select>
  <div class="sep"></div>
  <select id="selSize" class="tb" style="padding:2px 6px">
    <option value="16">16×16</option><option value="32" selected>32×32</option><option value="64">64×64</option>
  </select>
  <div class="sep"></div>
  <button class="tb" id="btnExportPng">Export PNG</button>
  <button class="tb" id="btnExportSheet">Sprite Sheet</button>
  <button class="tb" id="btnExportGif">Export Frames ZIP</button>
</div>
<div class="main">
  <div class="tools">
    <button class="tool active" data-tool="pen" title="Pen (B)">✏️</button>
    <button class="tool" data-tool="eraser" title="Eraser (E)">🧹</button>
    <button class="tool" data-tool="fill" title="Fill (G)">🪣</button>
    <button class="tool" data-tool="line" title="Line (L)">📏</button>
    <button class="tool" data-tool="rect" title="Rectangle (R)">⬜</button>
    <button class="tool" data-tool="circle" title="Circle (C)">⭕</button>
    <button class="tool" data-tool="picker" title="Color Picker (I)">💉</button>
  </div>
  <div class="canvas-area"><canvas id="art"></canvas></div>
  <div class="right-panel">
    <div class="panel-section">
      <div class="panel-title">Color</div>
      <div class="color-current"><div class="color-preview" id="colorPrev" style="background:#fff"></div><span class="color-hex" id="colorHex">#FFFFFF</span></div>
      <input type="color" id="colorPicker" value="#ffffff" style="width:100%;height:28px;border:none;cursor:pointer;margin-bottom:6px">
      <div class="color-grid" id="palette"></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Layers</div>
      <div class="layers" id="layerList"></div>
      <div style="display:flex;gap:4px;margin-top:6px">
        <button class="tb" id="btnAddLayer">+ Add</button>
        <button class="tb" id="btnDelLayer">Delete</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Zoom</div>
      <input type="range" id="zoom" min="4" max="24" value="12" style="width:100%;accent-color:#bc8cff">
    </div>
  </div>
</div>
<div class="frame-strip" id="frames"></div>
<script>
(function(){
const $=id=>document.getElementById(id);
let SIZE=32,curTool='pen',curColor='#ffffff',grid=true,onion=false;
let frames=[],curFrame=0,curLayer=0;
let playing=false,playInterval=null;
let history=[],histIdx=-1;
let lineStart=null,shapePreview=null;

const PALETTE=[
  '#000000','#1d2b53','#7e2553','#008751','#ab5236','#5f574f','#c2c3c7','#fff1e8',
  '#ff004d','#ffa300','#ffec27','#00e436','#29adff','#83769c','#ff77a8','#ffccaa',
  '#291814','#111d35','#422136','#125359','#742f29','#49333b','#a28879','#f2e6d9',
  '#be1250','#ff6c24','#ffd100','#25b33f','#2590e0','#6b5a73','#ef959e','#eebb77'
];

function makeFrame(){return{layers:[{name:'Layer 1',data:new Uint8ClampedArray(SIZE*SIZE*4),visible:true}]};}
function makeData(){return new Uint8ClampedArray(SIZE*SIZE*4);}

function init(){
  frames=[makeFrame()];curFrame=0;curLayer=0;
  history=[];histIdx=-1;saveHistory();
  renderLayers();renderFrames();render();
}

const canvas=$('art');
const ctx=canvas.getContext('2d');

function render(){
  const zoom=parseInt($('zoom').value);
  canvas.width=SIZE*zoom;canvas.height=SIZE*zoom;
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Checkerboard bg
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    ctx.fillStyle=(x+y)%2?'#1a1a2e':'#16162a';
    ctx.fillRect(x*zoom,y*zoom,zoom,zoom);
  }

  // Onion skin (previous frame)
  if(onion&&curFrame>0){
    ctx.globalAlpha=0.25;
    const pf=frames[curFrame-1];
    pf.layers.forEach(l=>{if(l.visible)drawLayer(l,zoom);});
    ctx.globalAlpha=1;
  }

  // Current frame layers
  const frame=frames[curFrame];
  frame.layers.forEach(l=>{if(l.visible)drawLayer(l,zoom);});

  // Shape preview
  if(shapePreview)drawShapePreview(zoom);

  // Grid
  if(grid){
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    for(let i=0;i<=SIZE;i++){
      ctx.beginPath();ctx.moveTo(i*zoom,0);ctx.lineTo(i*zoom,SIZE*zoom);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*zoom);ctx.lineTo(SIZE*zoom,i*zoom);ctx.stroke();
    }
  }
}

function drawLayer(layer,zoom){
  const id=ctx.createImageData(SIZE,SIZE);
  id.data.set(layer.data);
  const tmp=document.createElement('canvas');tmp.width=SIZE;tmp.height=SIZE;
  tmp.getContext('2d').putImageData(id,0,0);
  ctx.drawImage(tmp,0,0,SIZE,SIZE,0,0,SIZE*zoom,SIZE*zoom);
}

function drawShapePreview(zoom){
  if(!shapePreview)return;
  ctx.strokeStyle=curColor;ctx.lineWidth=1;
  ctx.setLineDash([2,2]);
  if(shapePreview.type==='line'){
    ctx.beginPath();ctx.moveTo(shapePreview.x1*zoom,shapePreview.y1*zoom);
    ctx.lineTo(shapePreview.x2*zoom,shapePreview.y2*zoom);ctx.stroke();
  }else if(shapePreview.type==='rect'){
    ctx.strokeRect(Math.min(shapePreview.x1,shapePreview.x2)*zoom,Math.min(shapePreview.y1,shapePreview.y2)*zoom,
      Math.abs(shapePreview.x2-shapePreview.x1)*zoom,Math.abs(shapePreview.y2-shapePreview.y1)*zoom);
  }else if(shapePreview.type==='circle'){
    const cx=Math.round((shapePreview.x1+shapePreview.x2)/2);
    const cy=Math.round((shapePreview.y1+shapePreview.y2)/2);
    const rx=Math.abs(shapePreview.x2-shapePreview.x1)/2;
    const ry=Math.abs(shapePreview.y2-shapePreview.y1)/2;
    ctx.beginPath();ctx.ellipse(cx*zoom,cy*zoom,rx*zoom,ry*zoom,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.setLineDash([]);
}

function setPixel(x,y,color){
  if(x<0||x>=SIZE||y<0||y>=SIZE)return;
  const frame=frames[curFrame];
  const layer=frame.layers[curLayer];
  const i=(y*SIZE+x)*4;
  if(color===null){layer.data[i+3]=0;}
  else{
    const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
    layer.data[i]=r;layer.data[i+1]=g;layer.data[i+2]=b;layer.data[i+3]=255;
  }
}

function getPixel(x,y){
  const layer=frames[curFrame].layers[curLayer];
  const i=(y*SIZE+x)*4;
  if(layer.data[i+3]===0)return null;
  return '#'+[layer.data[i],layer.data[i+1],layer.data[i+2]].map(c=>c.toString(16).padStart(2,'0')).join('');
}

function floodFill(sx,sy,target,fill){
  if(target===fill)return;
  const layer=frames[curFrame].layers[curLayer];
  const stack=[[sx,sy]];const visited=new Set();
  while(stack.length){
    const[x,y]=stack.pop();
    const k=y*SIZE+x;
    if(x<0||x>=SIZE||y<0||y>=SIZE||visited.has(k))continue;
    visited.add(k);
    const i=k*4;
    const cur=layer.data[i+3]===0?null:'#'+[layer.data[i],layer.data[i+1],layer.data[i+2]].map(c=>c.toString(16).padStart(2,'0')).join('');
    if(cur!==target)continue;
    setPixel(x,y,fill);
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

function drawLine(x0,y0,x1,y1){
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy;
  while(true){
    setPixel(x0,y0,curColor);
    if(x0===x1&&y0===y1)break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx;}
    if(e2<dx){err+=dx;y0+=sy;}
  }
}

function drawRect(x0,y0,x1,y1,fill){
  const minX=Math.min(x0,x1),maxX=Math.max(x0,x1);
  const minY=Math.min(y0,y1),maxY=Math.max(y0,y1);
  for(let y=minY;y<=maxY;y++)for(let x=minX;x<=maxX;x++){
    if(!fill&&y!==minY&&y!==maxY&&x!==minX&&x!==maxX)continue;
    setPixel(x,y,curColor);
  }
}

function drawCircle(x0,y0,x1,y1){
  const cx=Math.round((x0+x1)/2),cy=Math.round((y0+y1)/2);
  const rx=Math.abs(x1-x0)/2,ry=Math.abs(y1-y0)/2;
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const dx=(x-cx)/(rx||1),dy=(y-cy)/(ry||1);
    if(dx*dx+dy*dy<=1)setPixel(x,y,curColor);
  }
}

// History
function saveHistory(){
  histIdx++;
  history=history.slice(0,histIdx);
  history.push(JSON.stringify(frames.map(f=>({layers:f.layers.map(l=>({name:l.name,data:Array.from(l.data),visible:l.visible}))}))));
  if(history.length>50){history.shift();histIdx--;}
}
function undo(){if(histIdx<=0)return;histIdx--;restoreHistory();}
function redo(){if(histIdx>=history.length-1)return;histIdx++;restoreHistory();}
function restoreHistory(){
  const d=JSON.parse(history[histIdx]);
  frames=d.map(f=>({layers:f.layers.map(l=>({name:l.name,data:new Uint8ClampedArray(l.data),visible:l.visible}))}));
  renderLayers();renderFrames();render();
}

// Mouse handling
let drawing=false,startX,startY,lastX,lastY;
function getPixelCoord(e){
  const r=canvas.getBoundingClientRect();
  const zoom=parseInt($('zoom').value);
  const x=Math.floor((e.clientX-r.left)/zoom);
  const y=Math.floor((e.clientY-r.top)/zoom);
  return[x,y];
}

canvas.addEventListener('mousedown',e=>{
  const[x,y]=getPixelCoord(e);
  if(curTool==='pen'){drawing=true;setPixel(x,y,curColor);lastX=x;lastY=y;render();}
  else if(curTool==='eraser'){drawing=true;setPixel(x,y,null);lastX=x;lastY=y;render();}
  else if(curTool==='fill'){floodFill(x,y,getPixel(x,y),curColor);saveHistory();render();}
  else if(curTool==='picker'){const c=getPixel(x,y);if(c){curColor=c;updateColor();}}
  else if(curTool==='line'||curTool==='rect'||curTool==='circle'){
    drawing=true;startX=x;startY=y;
    shapePreview={type:curTool,x1:startX,y1:startY,x2:x,y2:y};render();
  }
});

canvas.addEventListener('mousemove',e=>{
  if(!drawing)return;
  const[x,y]=getPixelCoord(e);
  if(curTool==='pen'){
    drawLine(lastX,lastY,x,y);lastX=x;lastY=y;render();
  }else if(curTool==='eraser'){
    setPixel(x,y,null);lastX=x;lastY=y;render();
  }else if(shapePreview){
    shapePreview.x2=x;shapePreview.y2=y;render();
  }
});

canvas.addEventListener('mouseup',()=>{
  if(!drawing)return;drawing=false;
  if(shapePreview){
    const{x1,y1,x2,y2}=shapePreview;
    if(curTool==='line')drawLine(x1,y1,x2,y2);
    else if(curTool==='rect')drawRect(x1,y1,x2,y2,false);
    else if(curTool==='circle')drawCircle(x1,y1,x2,y2);
    shapePreview=null;
  }
  saveHistory();render();
});

canvas.addEventListener('mouseleave',()=>{if(drawing&&curTool==='pen'){drawing=false;saveHistory();}});

// Tools
document.querySelectorAll('.tool').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelector('.tool.active').classList.remove('active');
    b.classList.add('active');curTool=b.dataset.tool;
  });
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  const map={b:'pen',e:'eraser',g:'fill',l:'line',r:'rect',c:'circle',i:'picker'};
  if(map[e.key]){curTool=map[e.key];document.querySelector('.tool.active')?.classList.remove('active');
    document.querySelector(`[data-tool="${curTool}"]`)?.classList.add('active');}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
});

// Color
function updateColor(){
  $('colorPrev').style.background=curColor;
  $('colorHex').textContent=curColor.toUpperCase();
  $('colorPicker').value=curColor;
  document.querySelectorAll('.color-cell').forEach(c=>c.classList.toggle('active',c.dataset.c===curColor));
}
$('colorPicker').addEventListener('input',e=>{curColor=e.target.value;updateColor();});
const palEl=$('palette');
PALETTE.forEach(c=>{
  const d=document.createElement('div');d.className='color-cell';d.style.background=c;d.dataset.c=c;
  d.addEventListener('click',()=>{curColor=c;updateColor();});palEl.appendChild(d);
});
updateColor();

// Layers
function renderLayers(){
  const list=$('layerList');list.innerHTML='';
  const frame=frames[curFrame];
  frame.layers.slice().reverse().forEach((l,ri)=>{
    const ci=frame.layers.length-1-ri;
    const d=document.createElement('div');d.className='layer-item'+(ci===curLayer?' active':'');
    d.innerHTML=`<span class="layer-vis">${l.visible?'👁':'👁‍🗨'}</span><span style="flex:1">${l.name}</span>`;
    d.querySelector('.layer-vis').addEventListener('click',e=>{e.stopPropagation();l.visible=!l.visible;renderLayers();render();});
    d.addEventListener('click',()=>{curLayer=ci;renderLayers();});
    list.appendChild(d);
  });
}
$('btnAddLayer').addEventListener('click',()=>{
  const frame=frames[curFrame];
  frame.layers.push({name:'Layer '+(frame.layers.length+1),data:makeData(),visible:true});
  curLayer=frame.layers.length-1;renderLayers();saveHistory();
});
$('btnDelLayer').addEventListener('click',()=>{
  if(frames[curFrame].layers.length<=1)return;
  frames[curFrame].layers.splice(curLayer,1);
  curLayer=Math.min(curLayer,frames[curFrame].layers.length-1);
  renderLayers();saveHistory();render();
});

// Frames
function renderFrames(){
  const strip=$('frames');strip.innerHTML='';
  const zoom=parseInt($('zoom').value);
  const thumbSize=48;
  frames.forEach((f,i)=>{
    const c=document.createElement('canvas');c.className='frame-thumb'+(i===curFrame?' active':'');
    c.width=SIZE;c.height=SIZE;c.style.width=thumbSize+'px';c.style.height=thumbSize+'px';
    const tc=c.getContext('2d');tc.imageSmoothingEnabled=false;
    f.layers.forEach(l=>{if(l.visible){const id=tc.createImageData(SIZE,SIZE);id.data.set(l.data);tc.putImageData(id,0,0);}});
    c.addEventListener('click',()=>{curFrame=i;curLayer=Math.min(curLayer,frames[curFrame].layers.length-1);renderLayers();renderFrames();render();});
    strip.appendChild(c);
  });
  const add=document.createElement('button');add.className='frame-btn';add.textContent='+';
  add.addEventListener('click',()=>{
    const nf=makeFrame();frames.push(nf);curFrame=frames.length-1;curLayer=0;
    renderLayers();renderFrames();render();saveHistory();
  });
  strip.appendChild(add);
  // Dupe & delete buttons
  if(frames.length>1){
    const del=document.createElement('button');del.className='frame-btn';del.textContent='−';del.title='Delete frame';
    del.addEventListener('click',()=>{frames.splice(curFrame,1);curFrame=Math.min(curFrame,frames.length-1);renderLayers();renderFrames();render();saveHistory();});
    strip.appendChild(del);
  }
  const dup=document.createElement('button');dup.className='frame-btn';dup.textContent='⧉';dup.title='Duplicate frame';
  dup.addEventListener('click',()=>{
    const src=frames[curFrame];
    const nf={layers:src.layers.map(l=>({name:l.name,data:new Uint8ClampedArray(l.data),visible:l.visible}))};
    frames.splice(curFrame+1,0,nf);curFrame++;renderLayers();renderFrames();render();saveHistory();
  });
  strip.appendChild(dup);
}

// Animation preview
$('btnPlay').addEventListener('click',()=>{
  if(playing){clearInterval(playInterval);playing=false;$('btnPlay').textContent='Play';return;}
  playing=true;$('btnPlay').textContent='Stop';
  const fps=parseInt($('selFps').value);
  playInterval=setInterval(()=>{
    curFrame=(curFrame+1)%frames.length;curLayer=Math.min(curLayer,frames[curFrame].layers.length-1);
    renderLayers();renderFrames();render();
  },1000/fps);
});

// Grid / Onion
$('btnGrid').addEventListener('click',()=>{grid=!grid;$('btnGrid').classList.toggle('active',grid);render();});
$('btnOnion').addEventListener('click',()=>{onion=!onion;$('btnOnion').classList.toggle('active',onion);render();});
$('btnGrid').classList.add('active');
$('zoom').addEventListener('input',render);
$('selSize').addEventListener('change',e=>{SIZE=parseInt(e.target.value);init();});

// Undo/Redo
$('btnUndo').addEventListener('click',undo);
$('btnRedo').addEventListener('click',redo);

// Export PNG (current frame)
$('btnExportPng').addEventListener('click',()=>{
  const c=document.createElement('canvas');c.width=SIZE;c.height=SIZE;
  const tc=c.getContext('2d');
  frames[curFrame].layers.forEach(l=>{if(l.visible){const id=tc.createImageData(SIZE,SIZE);id.data.set(l.data);tc.putImageData(id,0,0);}});
  const a=document.createElement('a');a.download='pixelforge-frame.png';a.href=c.toDataURL('image/png');a.click();
});

// Sprite sheet
$('btnExportSheet').addEventListener('click',()=>{
  const c=document.createElement('canvas');c.width=SIZE*frames.length;c.height=SIZE;
  const tc=c.getContext('2d');tc.imageSmoothingEnabled=false;
  frames.forEach((f,fi)=>{
    const tmp=document.createElement('canvas');tmp.width=SIZE;tmp.height=SIZE;
    const t=tmp.getContext('2d');
    f.layers.forEach(l=>{if(l.visible){const id=t.createImageData(SIZE,SIZE);id.data.set(l.data);t.putImageData(id,0,0);}});
    tc.drawImage(tmp,fi*SIZE,0);
  });
  const a=document.createElement('a');a.download='pixelforge-spritesheet.png';a.href=c.toDataURL('image/png');a.click();
});

// Export all frames as individual PNGs (download one by one)
$('btnExportGif').addEventListener('click',()=>{
  frames.forEach((f,fi)=>{
    const c=document.createElement('canvas');c.width=SIZE;c.height=SIZE;
    const tc=c.getContext('2d');
    f.layers.forEach(l=>{if(l.visible){const id=tc.createImageData(SIZE,SIZE);id.data.set(l.data);tc.putImageData(id,0,0);}});
    const a=document.createElement('a');a.download=`frame-${String(fi+1).padStart(3,'0')}.png`;a.href=c.toDataURL('image/png');a.click();
  });
});

init();
})();
</script>
